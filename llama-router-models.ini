; Production llama-server router preset.
;
; Hosts gemma-4 (chat + vision), bge-m3 (embeddings), bge-reranker (reranking)
; in a single llama-server process. Each loaded on startup so the first
; request to each model has no cold-start cost.
;
; agent_server's LlamaServerEngine specifies `model: "gemma-4"` in chat
; requests. noted-rag (when its forwarding refactor lands) will hit
; bge-m3 and bge-reranker via the same endpoint with their respective
; model names.
;
; Validated empirically 2026-05-02 in _router_test/ — all 3 mixed model
; types coexist; per-model flags applied via INI overrides.

version = 1

[*]
n-gpu-layers = -1
flash-attn = on

[gemma-4]
model = /agent_server_models/gemma-4-E4B-it-UD-Q4_K_XL.gguf
mmproj = /agent_server_models/mmproj-F16.gguf
c = 131072
; Use the GGUF's embedded official Gemma 4 chat template (handles
; <|turn>...<turn|> markers, <|tool_call>...<tool_call|>, and the
; built-in strip_thinking() macro that removes <|channel>...<channel|>
; from prior model turns). Without --jinja, llama-server falls back to
; its hardcoded `peg-gemma4` compat template (logs: "outdated gemma4
; chat template, applying compatibility workarounds") which produces
; misformatted prompts and is the root cause of the "answer-inside-
; thinking" bug.
jinja = true
; Activate thinking via the official, non-deprecated flag.
; --reasoning on injects <|think|> through the Jinja template AND tells
; the reasoning extractor to populate delta.reasoning_content.
; --reasoning auto (the default) only does so if the template self-
; declares thinking, which Gemma 4's template does not without an
; explicit enable_thinking flag — so 'on' is required for thinking.
; The earlier `chat-template-kwargs '{"enable_thinking":true}'` setup
; works but llama-server prints a deprecation warning recommending
; --reasoning on/off as the supported path.
reasoning = on
load-on-startup = true

[bge-m3]
model = /noted_models/bge-m3-q8/bge-m3-Q8_0.gguf
embedding = true
pooling = cls
c = 8192
; Pooling-mode embedders need the WHOLE sequence in one physical batch
; (no chunked prefill possible). Default ubatch-size of 512 fails for any
; chunk > 512 tokens, and noted-rag's chunker targets 700-1000 tokens.
; Match physical batch to context so any single sequence fits.
batch-size = 8192
ubatch-size = 8192
load-on-startup = true

[bge-reranker]
model = /noted_models/bge-reranker-v2-m3-q8/bge-reranker-v2-m3-Q8_0.gguf
embedding = true
pooling = rank
c = 8192
; Same reason as bge-m3: query + </s></s> + chunk pairs routinely
; exceed 512 tokens; pooling forbids chunked prefill.
batch-size = 8192
ubatch-size = 8192
load-on-startup = true
