; llama-server router-mode preset for the Phase 8 PoC.
;
; Three models with mixed types coexisting in one llama-server process:
;   - gemma-4 chat + vision (uses --mmproj for multimodal)
;   - bge-m3 embeddings (uses --embedding --pooling cls)
;   - bge-reranker-v2-m3 reranker (uses --embedding --pooling rank)
;
; All `load-on-startup = true` to guarantee no cold-start latency for
; any of the three. Per-model overrides take precedence over [*].
;
; Goal: empirically validate whether mixed model TYPES coexist in a
; single llama-server router instance (the open question from the
; migration plan's Phase 8). If yes, Phase 9 takes the 1-router shape.

version = 1

[*]
n-gpu-layers = -1
flash-attn = on

[gemma-4]
model = /agent_server_models/gemma-4-E4B-it-UD-Q4_K_XL.gguf
mmproj = /agent_server_models/mmproj-F16.gguf
c = 131072
load-on-startup = true

[bge-m3]
model = /noted_models/bge-m3-q8/bge-m3-Q8_0.gguf
embedding = true
pooling = cls
c = 8192
load-on-startup = true

[bge-reranker]
model = /noted_models/bge-reranker-v2-m3-q8/bge-reranker-v2-m3-Q8_0.gguf
embedding = true
pooling = rank
c = 8192
load-on-startup = true
